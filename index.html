    <script>
        $(document).ready(function() {
            $("#send_code").click(function() { //ID 為 submitExample 的按鈕被點擊時
                $.ajax({
                    type: "POST", //傳送方式
                    url: "service.php", //傳送目的地
                    dataType: "json", //資料格式
                    data: { //傳送資料
                        company_code : document.getElementById('code_number').value
                    },
                    success: function(data) {
                        if (data) { //如果後端回傳 json 資料有 nickname
                            $("#demo")[0].reset(); //重設 ID 為 demo 的 form (表單)
                            console.log(data)
                            document.getElementById('code_number').value = data.code_number;
                            document.getElementById('b2').value = data.code_company;
                            document.getElementById('b5').value = data.min_price;
                            document.getElementById('b6').value = data.max_price;
                            document.getElementById('b7').value = data.open_price;
                            document.getElementById('g1').value = data.q3_2019;
                            document.getElementById('g2').value = data.q4_2019;
                            document.getElementById('g3').value = data.q1_2020;
                            document.getElementById('g4').value = data.q2_2020;
                            document.getElementById('i1').value = data.investment;
                            document.getElementById('i2').value = data.credict;
                            document.getElementById('i3').value = data.employed;
                            document.getElementById('i4').value = data.total;

                        }
                    },
                    error: function(jqXHR) {
                        $("#demo")[0].reset(); //重設 ID 為 demo 的 form (表單)
                        alert(jqXHR.status);
                    }
                })
            })        
        });
    </script>
